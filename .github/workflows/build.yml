name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows
          - os: macos-latest
            name: macos
          - os: ubuntu-22.04
            name: linux

    runs-on: ${{ matrix.os }}

    env:
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: 1

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-build.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements-build.txt

      # ── Linux：安装 Qt XCB 运行时依赖 ──────────────────────────
      - name: Install Linux Qt runtime libs
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libxcb-xinerama0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-xfixes0 libxcb-cursor0 \
            libgl1-mesa-glx libegl1 libdbus-1-3 \
            xvfb

      # ── macOS：从 PNG 生成 .icns ────────────────────────────────
      - name: Generate macOS icon (.icns)
        if: runner.os == 'macOS'
        run: |
          ICONSET=resources/icons/app_icon.iconset
          mkdir -p "$ICONSET"
          for size in 16 32 64 128 256 512; do
            sips -z $size $size resources/icons/app_icon.png \
              --out "$ICONSET/icon_${size}x${size}.png"
            double=$((size * 2))
            sips -z $double $double resources/icons/app_icon.png \
              --out "$ICONSET/icon_${size}x${size}@2x.png"
          done
          iconutil -c icns "$ICONSET" -o resources/icons/app_icon.icns

      # ── 执行构建 ────────────────────────────────────────────────
      - name: Build (Linux with virtual display)
        if: runner.os == 'Linux'
        run: xvfb-run -a python build.py

      - name: Build (Windows / macOS)
        if: runner.os != 'Linux'
        run: python build.py

      # ── 上传产物 ────────────────────────────────────────────────
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: video_bd_${{ matrix.name }}
          path: dist/release/
          if-no-files-found: error

  # ── 打 Tag 时自动创建 GitHub Release ──────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: false

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
